name: Daily Price Scrape

on:
  schedule:
    # Daily at 00:07 UTC (9:07 AM JST) — avoid busy :00 slot on GH Actions
    - cron: "7 0 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run scraper
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npx tsx scripts/run-scraper.ts

      - name: Trigger Vercel cache revalidation
        if: success()
        run: |
          response=$(curl -sS -o /tmp/resp -w "%{http_code}" -X POST \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_BYPASS_TOKEN }}" \
            -H "x-vercel-set-bypass-cookie: samesitenone" \
            -H "x-revalidate-secret: ${{ secrets.REVALIDATION_SECRET }}" \
            "${{ secrets.VERCEL_URL }}/api/revalidate")
          echo "HTTP $response"
          cat /tmp/resp
          test "$response" = "200"

      - name: Notify on failure
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"⚠️ Daily price scrape failed — check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            || true
